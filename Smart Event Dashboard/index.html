<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Event Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1 class="title">🎯 Smart Event Dashboard</h1>

  <div class="container">

    
    <div class="card">
      <h2>Add New Event</h2>

      <label>Event Title</label>
      <input type="text" id="title" placeholder="Enter event title" />

      <label>Event Date</label>
      <input type="date" id="date" />

      <label>Category</label>
      <select id="category">
        <option>Conference</option>
        <option>Workshop</option>
        <option>Social</option>
        <option>Meetup</option>
      </select>

      <label>Description</label>
      <textarea id="description" placeholder="Event description"></textarea>

      <button id="addEvent">Add Event</button>
    </div>


    <div class="card">
      <h2>My Events</h2>

      <div class="actions">
        <button id="clearAll">Clear All Events</button>
        <button id="sample">Add Sample Events</button>
      </div>

      <div id="eventList"></div>
    </div>
  </div>

  
    <p id="output"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
